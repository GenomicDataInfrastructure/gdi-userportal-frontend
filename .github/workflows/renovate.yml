name: Renovate
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *" # Works on 7 AM everyday

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Run Renovate
        uses: renovatebot/github-action@v32.34.0
        with:
          token: ${{ secrets.RENOVATE_TOKEN }} # We need to create RENOVATE_TOKEN secret via github
